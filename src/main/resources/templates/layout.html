<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="common_header(title, scripts)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/output.css}" rel="stylesheet">
    <title th:text="${title}+' | フォトブログ'"></title>
</head>
<body>
    <header th:fragment="common_navbar" class="w-full bg-green-400 text-white p-2 flex">
        <h1 class="text-2xl text-bold">フォトブログ</h1>

        <div class="ml-auto">
            <div>ようこそ、<span th:text="${#authentication.name}">User</span>さん</div>
        
            <!-- ログアウトフォーム (POST) -->
            <form th:action="@{/logout}" method="post">
                <button type="submit">ログアウト</button>
            </form>            
        </div>

    </header>

    <footer th:fragment="common_footer" class="w-full bg-gray-400 h-96 text-center flex items-center justify-center">
        <p class="text-white">Copyright &copy; 2025 Photo Blog</p>
    </footer>
</body>
</html>
